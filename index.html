<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7-Eleven Shop</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#008000">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
  <!-- SPLASH SCREEN -->
  <div id="splashScreen" class="splash">
    <div class="splash-card">
      <div class="seven-eleven-logo">
        <span class="logo-7">7</span><span class="logo-eleven">-ELEVEn</span>
      </div>
      <h1>Shop & Add!</h1>
      <p>Pick <strong>2 items</strong> to find the total price 🛒</p>
      <button id="startBtn" class="btn-start">Let's Shop!</button>
    </div>
  </div>

  <!-- MAIN GAME -->
  <div id="gameScreen" class="game hidden">
    <div class="header">
      <div class="seven-eleven-logo small">
        <span class="logo-7">7</span><span class="logo-eleven">-ELEVEn</span>
      </div>
      <p class="instruction">Pick <strong>2 items</strong> to add together!</p>
    </div>
    <div id="itemsGrid" class="items-grid">
      <div class="loading">Loading items... 🛒</div>
    </div>
    <div id="calcStrip" class="calc-strip hidden">
      <div class="calc-inner">
        <div class="calc-item">
          <img id="calcImg1" src="" alt="">
          <span id="calcPrice1" class="calc-price">฿0</span>
        </div>
        <span class="calc-operator">+</span>
        <div class="calc-item">
          <img id="calcImg2" src="" alt="">
          <span id="calcPrice2" class="calc-price">฿0</span>
        </div>
        <span class="calc-operator">=</span>
        <span id="calcTotal" class="calc-total">฿0</span>
      </div>
      <button id="resetBtn" class="btn-reset">🔄 Start Again</button>
    </div>
  </div>

  <!-- Teacher access link, bottom right corner -->
  <a href="/teacher.html" class="teacher-link">🔐 Teacher access</a>

  <script src="app.js"></script>
</body>
</html>
